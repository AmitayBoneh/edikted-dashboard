    /* 芒聰聙芒聰聙芒聰聙 Animated Counter 芒聰聙芒聰聙芒聰聙 */
    function AnimNum({value,prefix='',suffix='',duration=800}){
      const[display,setDisplay]=useState(0);
      const num=typeof value==='number'?value:parseFloat(String(value).replace(/[^0-9.]/g,''))||0;
      useEffect(()=>{
        let start=0;const step=num/((duration/16));
        const id=setInterval(()=>{start+=step;if(start>=num){setDisplay(num);clearInterval(id)}else setDisplay(Math.round(start))},16);
        return()=>clearInterval(id);
      },[num]);
      return <span>{prefix}{display.toLocaleString()}{suffix}</span>;
    }

    /* 芒聰聙芒聰聙芒聰聙 Progress Bar 芒聰聙芒聰聙芒聰聙 */
    function ProgressBar({value,max=100,color='var(--red)',height=6}){
      const pct=Math.min((value/max)*100,100);
      return(
        <div style={{background:'#EEE',borderRadius:height/2,height,overflow:'hidden',width:'100%'}}>
          <div style={{background:color,height:'100%',borderRadius:height/2,width:`${pct}%`,transition:'width 1s cubic-bezier(.2,.8,.2,1)'}}/>
        </div>
      );
    }

    /* 芒聰聙芒聰聙芒聰聙 Sparkline mini chart 芒聰聙芒聰聙芒聰聙 */
    function Sparkline({data,color='var(--red)',height=40}){
      const max=Math.max(...data);const min=Math.min(...data);const range=max-min||1;
      const w=120;const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${height-((v-min)/range)*(height-4)-2}`).join(' ');
      return <svg width={w} height={height} style={{display:'block'}}><polyline points={pts} fill="none" stroke={color} strokeWidth="2"/></svg>;
    }

    const ChartTip=({active,payload,label})=>{

      return(
        <div style={{background:'white',padding:'10px 14px',border:'1px solid #E8E8E8',boxShadow:'0 4px 20px rgba(0,0,0,.08)',fontSize:12,fontFamily:'DM Sans'}}>

        </div>
      );
    };

    /* 芒聰聙芒聰聙芒聰聙 Sortable Table 芒聰聙芒聰聙芒聰聙 */
    function SortTable({columns,data,accent='var(--red)'}){
      const[sortCol,setSortCol]=useState(null);
      const[sortDir,setSortDir]=useState('desc');
      const sorted=useMemo(()=>{
        if(sortCol===null)return data;
        return[...data].sort((a,b)=>{
          const va=a[sortCol],vb=b[sortCol];
          const na=typeof va==='string'?parseFloat(va.replace(/[^0-9.-]/g,''))||0:va;
          const nb=typeof vb==='string'?parseFloat(vb.replace(/[^0-9.-]/g,''))||0:vb;
          if(typeof va==='string'&&isNaN(na))return sortDir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
          return sortDir==='asc'?na-nb:nb-na;
        });
      },[data,sortCol,sortDir]);
      const toggleSort=(i)=>{if(sortCol===i)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortCol(i);setSortDir('desc')}};
      return(
        <div style={{overflow:'auto',borderRadius:8,border:'1px solid #E8E8E8'}}>
          <table>
            <thead><tr style={{background:'#111',color:'white'}}>
              {columns.map((c,i)=>(
                <th key={i} onClick={()=>toggleSort(i)} style={{padding:'12px 14px',textAlign:c.align||'left',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
                  {c.label} {sortCol===i?(sortDir==='asc'?'芒聠聭':'芒聠聯'):''}
                </th>

                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );

                      <Tooltip content={<ChartTip/>}/>
                      <Bar dataKey="revenue" name="Revenue" fill="#111" radius={[2,2,0,0]}/>
                      <Bar dataKey="lost" name="Lost" fill="#E60023" radius={[2,2,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              {/* Price + Discount */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                <div style={{background:'white',padding:24,border:'1px solid #E8E8E8'}}>
                  <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Price Distribution</div>
                  <ResponsiveContainer width="100%" height={220}>
                    <BarChart data={d.priceDistribution}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
                      <XAxis dataKey="range" tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                      <Tooltip content={<ChartTip/>}/>
                      <Bar dataKey="count" name="Products" fill="#111" radius={[2,2,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{background:'white',padding:24,border:'1px solid #E8E8E8'}}>
                  <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Discount Tiers</div>
                  <div style={{display:'flex',flexDirection:'column',gap:16,marginTop:8}}>
                    {d.discounts.map((disc,i)=>{
                      const pct=(disc.count/k.uniqueProducts*100).toFixed(1);
                      return(
                        <div key={disc.tier}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                            <span style={{fontSize:14,fontWeight:700}}>{disc.tier} OFF</span>
                            <span style={{fontSize:13,color:'#999'}}>{disc.count.toLocaleString()} items ({pct}%)</span>
                          </div>
                          <ProgressBar value={disc.count} max={2500} color={i===0?'#111':i===1?'#555':i===2?'#999':'#E60023'} height={8}/>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </>}

            {/* 芒聲聬芒聲聬芒聲聬 SECTIONS 芒聲聬芒聲聬芒聲聬 */}
            {tab==='sections'&&<>
              <div style={{background:'white',padding:24,border:'1px solid #E8E8E8',marginBottom:24}}>
                <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Section Comparison 芒聙聰 In Stock vs Out of Stock</div>
                <ResponsiveContainer width="100%" height={380}>
                  <BarChart data={d.sections.filter(s=>s.name!=='Clothing')} layout="vertical" barGap={0}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" horizontal={false}/>
                    <XAxis type="number" tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                    <YAxis dataKey="name" type="category" width={95} tick={{fontSize:12,fill:'#111',fontWeight:600}} axisLine={false} tickLine={false}/>
                    <Tooltip content={<ChartTip/>}/>
                    <Legend/>
                    <Bar dataKey="inStock" name="In Stock" stackId="a" fill="#111"/>
                    <Bar dataKey="outOfStock" name="Out of Stock" stackId="a" fill="#E60023"/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
              <SortTable columns={[
                {label:'Section',bold:true},{label:'Products',align:'center'},{label:'In Stock',align:'center',color:'#1B7340'},
                {label:'OOS',align:'center',color:'#E60023'},{label:'OOS %',align:'center'},{label:'On Sale',align:'center'},
                {label:'Avg Price',align:'center'},{label:'Revenue',align:'center'},{label:'Lost Rev',align:'center'}
              ]} data={d.sections.map(s=>[
                s.name,s.total,s.inStock,s.outOfStock,
                (s.outOfStock/s.total*100).toFixed(1)+'%',s.onSale,
                '芒聜陋'+s.avgPrice,fmt(s.revenue),fmt(s.lostRevenue)
              ])}/>
            </>}

            {/* 芒聲聬芒聲聬芒聲聬 PRODUCTS 芒聲聬芒聲聬芒聲聬 */}
            {tab==='products'&&<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
                <div style={{background:'white',padding:24,border:'1px solid #E8E8E8'}}>
                  <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Top Product Types</div>
                  <ResponsiveContainer width="100%" height={440}>
                    <BarChart data={d.types.slice(0,15)} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" horizontal={false}/>
                      <XAxis type="number" tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                      <YAxis dataKey="name" type="category" width={85} tick={{fontSize:12,fill:'#111'}} axisLine={false} tickLine={false}/>
                      <Tooltip content={<ChartTip/>}/>
                      <Bar dataKey="count" name="Products" fill="#111" radius={[0,3,3,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{background:'white',padding:24,border:'1px solid #E8E8E8'}}>
                  <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Color Palette</div>
                  <ResponsiveContainer width="100%" height={440}>
                    <BarChart data={d.colors} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" horizontal={false}/>
                      <XAxis type="number" tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                      <YAxis dataKey="name" type="category" width={65} tick={{fontSize:11,fill:'#111'}} axisLine={false} tickLine={false}/>
                      <Tooltip content={<ChartTip/>}/>
                      <Bar dataKey="count" name="Products" radius={[0,3,3,0]}>
                        {d.colors.map((c,i)=><Cell key={i} fill={COLOR_MAP[c.name]||'#999'}/>)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
              {/* Style Cloud */}
              <div style={{background:'white',padding:24,border:'1px solid #E8E8E8'}}>
                <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Style Tags</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {d.styles.map((s,i)=>{
                    const ratio=s.count/d.styles[0].count;
                    return(
                      <span key={s.name} className="hover-lift" style={{
                        padding:'8px 18px',border:ratio>.6?'none':'1px solid #E8E8E8',
                        background:ratio>.6?'#111':'white',color:ratio>.6?'white':'#111',
                        fontSize:11+Math.round(ratio*6),fontWeight:600,letterSpacing:'.02em',cursor:'default',transition:'all .2s'
                      }}>{s.name} <span style={{opacity:.5,fontSize:11}}>({s.count})</span></span>
                    );
                  })}
                </div>
              </div>
            </>}

            {/* 芒聲聬芒聲聬芒聲聬 PRICING 芒聲聬芒聲聬芒聲聬 */}
            {tab==='pricing'&&<>
              <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:12}}>Most Expensive 芒聙聰 Click headers to sort</div>
              <SortTable columns={[
                {label:'#',align:'center'},{label:'Product',bold:true},{label:'Type',align:'center'},
                {label:'Sale Price',align:'center',color:'#E60023',bold:true},{label:'Original',align:'center'},
                {label:'Discount',align:'center'},{label:'Savings',align:'center',color:'#1B7340',bold:true}
              ]} data={d.topExpensive.map((p,i)=>[
                i+1,p.name,p.type,'芒聜陋'+p.price.toLocaleString(),'芒聜陋'+p.orig.toLocaleString(),p.disc,'芒聜陋'+(p.orig-p.price).toLocaleString()
              ])}/>

              <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',margin:'28px 0 12px'}}>Price by Section 芒聙聰 Range View</div>
              <div style={{background:'white',padding:24,border:'1px solid #E8E8E8',marginBottom:28}}>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={d.sectionPrices}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
                    <XAxis dataKey="section" tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                    <Tooltip content={<ChartTip/>}/>
                    <Bar dataKey="min" name="Min 芒聜陋" fill="#E8E8E8" radius={[2,2,0,0]}/>
                    <Bar dataKey="avg" name="Avg 芒聜陋" fill="#111" radius={[2,2,0,0]}/>
                    <Bar dataKey="max" name="Max 芒聜陋" fill="#E60023" radius={[2,2,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:12}}>Cheapest Products</div>
              <SortTable columns={[
                {label:'#',align:'center'},{label:'Product',bold:true},{label:'Type',align:'center'},
                {label:'Price',align:'center',color:'#1B7340',bold:true},{label:'Original',align:'center'},{label:'Discount',align:'center'}
              ]} data={d.topCheap.map((p,i)=>[i+1,p.name,p.type,'芒聜陋'+p.price,'芒聜陋'+p.orig,p.disc])}/>
            </>}

            {/* 芒聲聬芒聲聬芒聲聬 ALERTS 芒聲聬芒聲聬芒聲聬 */}
            {tab==='alerts'&&<>
              {/* Alert Banner */}
              <div style={{background:'#111',color:'white',padding:'20px 24px',marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
                <div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900}}>
                    {k.outOfStock.toLocaleString()} products out of stock
                  </div>
                  <div style={{fontSize:13,color:'#999',marginTop:4}}>{fmt(k.lostRevenue)} in potential lost revenue 脗路 {((k.lostRevenue/(k.totalRevenue+k.lostRevenue))*100).toFixed(1)}% of catalog at risk</div>
                </div>
                <div style={{background:'var(--red)',color:'white',padding:'10px 20px',fontSize:12,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>
                  ACTION REQUIRED
                </div>
              </div>

              <div style={{background:'white',padding:24,border:'1px solid #E8E8E8',marginBottom:24}}>
                <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'#999',marginBottom:16}}>Out-of-Stock Rate by Category</div>
                <ResponsiveContainer width="100%" height={340}>
                  <BarChart data={d.oosAlerts} layout="vertical">
                    <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" horizontal={false}/>
                    <XAxis type="number" domain={[0,40]} tickFormatter={v=>`${v}%`} tick={{fontSize:10,fill:'#999'}} axisLine={false} tickLine={false}/>
                    <YAxis dataKey="type" type="category" width={90} tick={{fontSize:12,fill:'#111'}} axisLine={false} tickLine={false}/>
                    <Tooltip formatter={v=>`${v}%`}/>
                    <Bar dataKey="rate" name="OOS Rate" radius={[0,3,3,0]}>
                      {d.oosAlerts.map((a,i)=><Cell key={i} fill={a.rate>25?'#E60023':a.rate>20?'#111':'#999'}/>)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <SortTable columns={[
                {label:'Category',bold:true},{label:'Total',align:'center'},{label:'OOS',align:'center',color:'#E60023',bold:true},
                {label:'OOS Rate',align:'center'},{label:'Status',align:'center'}
              ]} data={d.oosAlerts.map(a=>[
                a.type,a.total,a.oos,a.rate+'%',
                a.rate>25?'芒卢陇 CRITICAL':a.rate>20?'芒聴聣 WARNING':'芒聴聥 WATCH'
              ])}/>
            </>}

          </main>

          {/* Footer */}
          <footer style={{borderTop:'1px solid #E8E8E8',padding:'20px 40px',textAlign:'center',fontSize:11,color:'#BBB',letterSpacing:'.03em'}}>
            edikted.co.uk 脗路 {k.uniqueProducts.toLocaleString()} unique products 脗路 {d.sections.length} sections 脗路 Prices in 芒聜陋 (ILS) 脗路 Scraped April 15, 2026
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
  </script>
</body>
</html>
